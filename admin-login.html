<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrador - TechStore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{

    width:400px;
    background:white;

    padding:40px;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,.15);

    text-align:center;

}

h1{

    color:#ff6b00;

    margin-bottom:10px;

}

p{

    color:#666;

    margin-bottom:25px;

}

input{

    width:100%;

    padding:15px;

    border:1px solid #ccc;

    border-radius:10px;

    font-size:16px;

    margin-bottom:20px;

}

button{

    width:100%;

    padding:15px;

    background:#ff6b00;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#e65c00;

}

.voltar{

    display:block;

    margin-top:20px;

    text-decoration:none;

    color:#666;

    font-weight:bold;

}

.voltar:hover{

    color:#ff6b00;

}

</style>

</head>

<body>

<div class="container">

<h1>🔐 Área Administrativa</h1>

<p>Digite a senha para acessar o painel da TechStore.</p>

<input
type="password"
id="senha"
placeholder="Senha do administrador"
>

<button onclick="entrar()">

Entrar

</button>

<a href="minha-conta.html" class="voltar">

← Voltar

</a>

</div>

<script>

function entrar(){

    const senha = document.getElementById("senha").value;

    if(senha === "TechStore2026"){

        window.location.href = "admin.html";

    }else{

        alert("Senha incorreta!");

    }

}

</script>

</body>
</html>
