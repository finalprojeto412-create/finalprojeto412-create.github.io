<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Conta - TechStore</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:850px;
max-width:95%;

display:flex;
gap:30px;

}

.card{

flex:1;

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

text-align:center;

}

.card h2{

margin-bottom:20px;

color:#ff6b00;

}

.card p{

margin-bottom:30px;

color:#666;

line-height:25px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:10px;

background:#ff6b00;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#e65c00;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>👤 Sou Cliente</h2>

<p>

Entre para acompanhar seus pedidos, realizar compras e acessar sua conta.

</p>

<a href="login.html">

<button>

Entrar como Cliente

</button>

</a>

</div>

<div class="card">

<h2>🔐 Administrador</h2>

<p>

Área exclusiva para gerenciamento da TechStore.

</p>

<a href="admin-login.html">

<button>

Entrar como Administrador

</button>

</a>

</div>

</div>

</body>
</html>
