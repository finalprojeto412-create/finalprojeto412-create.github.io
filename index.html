<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore - Catálogo de Produtos</title>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

/* HEADER */

header{

    background:#ff6b00;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px;

    flex-wrap:wrap;

}
header h1{
    font-size:30px;
}

nav{

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;

}

nav a{

    color:white;
    text-decoration:none;
    margin-left:0;
    font-weight:bold;

}

nav a:hover{
    color:#ffd43b;
}

/* BANNER */

.banner{
    width:100%;
    padding:0;
    margin:0;
    overflow:hidden;
}

.banner img{
    width:100%;
    height:auto;
    display:block;
}

/* PRODUTOS */

.produtos{

    width:90%;
    margin:40px auto;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

    gap:25px;

}

.card{

    background:white;

    border-radius:10px;

    box-shadow:0 5px 15px rgba(0,0,0,.2);

    overflow:hidden;

    width:100%;

    transition:.3s;

}

.card:hover{

    transform:translateY(-8px);

}

.card img{
    width:100%;
    height:260px;
    object-fit:contain;
    padding:15px;
    transition:.3s;
}

.card:hover img{
    transform:scale(1.05);

}

.card h3{

    margin:15px;

}

.card p{

    margin:0 15px;
    color:#666;

}

.categoria{

    display:block;
    margin:15px;
    color:#ff6b00;
    font-weight:bold;

}

.card h4{

    margin:15px;
    color:#198754;
    font-size:22px;

}

.card button{

    width:calc(100% - 30px);
    margin:15px;
    padding:12px;

    border:none;
    border-radius:8px;

    background:#ff6b00;

    color:white;

    cursor:pointer;

    font-size:16px;

    transition:0.3s;

}

.card button:hover{

    background:#e65c00;

}

/* MODAL */

.modal{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.6);

    justify-content:center;
    align-items:center;

}

.modal-content{

    background:white;

    width:90%;
    
    max-width:500px;

    padding:30px;

    border-radius:10px;

    position:relative;

}

.fechar{

    position:absolute;

    right:15px;

    top:10px;

    font-size:30px;

    cursor:pointer;

}

form{

    display:flex;

    flex-direction:column;

}

form input,
form textarea{

    padding:12px;

    width:100%;

    margin-bottom:15px;

    border:1px solid #ccc;

    border-radius:30px;

    font-size:16px;

}

form textarea{

    resize:none;

}

form button{

    background:#ff6b00;

    color:white;

    border:none;

    padding:14px;

    border-radius:8px;

    cursor:pointer;

    font-size:17px;

}

form button:hover{

    background:#146c43;

}

/* FOOTER */

footer{

    background:#212529;

    color:white;

    text-align:center;

    padding:20px;

    margin-top:40px;

}

/* RESPONSIVO */

@media (max-width:768px){

    header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-direction:row;
    padding:15px 20px;
}

   .logo{

    width:180px;
    margin-bottom:0;

}


    nav a{
        margin-left:0;
        font-size:18px;
    }

    .produtos{
        width:95%;
        grid-template-columns:1fr;
    }

    .card img{
        height:220px;
    }

    .modal-content{
        width:95%;
        padding:20px;
    }

    h1{
        font-size:24px;
    }

}
.btn-banner{

    display:inline-block;

    margin-top:20px;

    background:#ff6b00;

    color:white;

    padding:15px 30px;

    border-radius:8px;

    text-decoration:none;

    font-weight:bold;

}
.logo{

    width:260px;
    max-width:100%;
    height:auto;

}

.btn-banner:hover{

    background:white;

}
html{
    scroll-behavior:smooth;
}
    .usuario-menu{

    position:relative;
    display:inline-block;
    margin-left:20px;

}
    /* BOTÃO MENU */

.menu-mobile{

    display:none;
    font-size:35px;
    cursor:pointer;
    color:white;
    margin-left:auto;

}
/* RESPONSIVO */

@media(max-width:768px){

    header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-direction:row;
    padding:15px 20px;

}

    .menu-mobile{

        display:block;

    }

    nav{

        display:none;
        width:100%;
        flex-direction:column;
        margin-top:20px;

    }

    nav.ativo{

        display:flex;

    }

    nav a{

        margin:10px 0;
        text-align:center;

    }

}


</style>

</head>

<body>

<header>

<img src="logo.png" alt="TechStore" class="logo">
    
<div class="menu-mobile" id="menuMobile">
    ☰
</div>

<nav id="menu">

<a href="index.html">🏠 Início</a>

<a href="#produtos">💻 Produtos</a>

<a href="sobrenos.html">🏢 Sobre Nós</a>

<a href="contato.html">📞 Contato</a>

<a href="pedidos.html">📋 Pedidos</a>

<a href="#" id="btnConta">👤 Minha Conta</a>

</nav>

</header>

<section class="banner">
    <img src="banner-techstore.png" alt="Banner TechStore">
</section>

<main>

    
    <div class="produtos" id="listaProdutos"></div>

</div>

</main>


<div class="modal" id="modal">

<div class="modal-content">

<span class="fechar">&times;</span>

<h2>Solicitação de Orçamento</h2>

<form id="formulario">

    <input
        type="text"
        id="nome"
        placeholder="Nome"
        required
    >

    <input
        type="email"
        id="email"
        placeholder="E-mail"
        required
    >

    <input
        type="tel"
        id="telefone"
        placeholder="Telefone"
        required
    >

    <input
        type="text"
        id="produto"
        placeholder="Produto de interesse"
        readonly
        required
    >

    <input
        type="number"
        id="quantidade"
        placeholder="Quantidade"
        min="1"
        required
    >

    <textarea
        id="mensagem"
        rows="5"
        placeholder="Mensagem"
        required
    ></textarea>

    <button type="submit">
        Enviar Solicitação
    </button>

</form>
</div>
</div>

<footer>

<p>© 2026 TechStore - Todos os direitos reservados.</p>

</footer>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
<script src="supabase.js"></script>

<script>
const modal = document.getElementById("modal");
const fechar = document.querySelector(".fechar");
const formulario = document.getElementById("formulario");
const campoProduto = document.getElementById("produto");

//==============================
// ABRIR MODAL
//==============================

function configurarBotoesOrcamento(){

    document.querySelectorAll(".btn-orcamento").forEach(botao=>{

        botao.onclick = function(){

            const produto = this.closest(".card").querySelector("h3").textContent;

            campoProduto.value = produto;

            modal.style.display = "flex";

        }

    });

}

//==============================
// FECHAR MODAL
//==============================

fechar.onclick = function(){

    modal.style.display = "none";

}

window.onclick = function(e){

    if(e.target == modal){

        modal.style.display = "none";

    }

}

//==============================
// ENVIAR PEDIDO
//==============================

formulario.addEventListener("submit", async function(e){

    e.preventDefault();

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const telefone = document.getElementById("telefone").value;
    const produto = document.getElementById("produto").value;
    const quantidade = document.getElementById("quantidade").value;
    const mensagem = document.getElementById("mensagem").value;

    const { error } = await supabaseClient

    .from("pedidos")

    .insert([{

        nome,
        email,
        telefone,
        produto,
        quantidade,
        mensagem

    }]);

    if(error){

        alert(error.message);
        return;

    }

    alert("Pedido realizado com sucesso!");

    formulario.reset();

    modal.style.display = "none";

});

//==============================
// BOTÃO MINHA CONTA
//==============================

const btnConta = document.getElementById("btnConta");

if(localStorage.getItem("usuarioLogado") === "true"){

    btnConta.innerHTML = "👤 " + localStorage.getItem("nome");

    btnConta.href = "perfil.html";

}else{

    btnConta.innerHTML = "👤 Minha Conta";

    btnConta.href = "login-opcao.html";

}

//==============================
// MENU MOBILE
//==============================

const menu = document.getElementById("menu");
const menuMobile = document.getElementById("menuMobile");

menuMobile.onclick = function(){

    menu.classList.toggle("ativo");

}

//==============================
// CARREGAR PRODUTOS
//==============================

async function carregarProdutos(){

    const { data, error } = await supabaseClient

    .from("produtos")

    .select("*");

    if(error){

        console.log(error);

        return;

    }

    const lista = document.getElementById("listaProdutos");

    lista.innerHTML = "";

    data.forEach(produto=>{

        lista.innerHTML += `

        <div class="card">

            <img src="${produto.imagem}" alt="${produto.nome}">

            <h3>${produto.nome}</h3>

            <p>${produto.descricao}</p>

            <span class="categoria">

                Categoria: ${produto.categoria}

            </span>

            <h4>

                R$ ${Number(produto.preco).toFixed(2)}

            </h4>

            <button class="btn-orcamento">

                Solicitar Orçamento

            </button>

        </div>

        `;

    });

    configurarBotoesOrcamento();

}

//==============================
// INICIAR
//==============================

window.onload = function(){

    carregarProdutos();

}
    
</script>
</body>
</html>
