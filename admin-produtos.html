<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administração de Produtos - TechStore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
}

header{

    background:#ff6b00;
    color:white;
    padding:20px;
    text-align:center;

}

.container{

    width:90%;
    max-width:900px;
    margin:40px auto;

}

.card{

    background:white;
    border-radius:12px;
    padding:30px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);

}

h2{

    margin-bottom:25px;

}

input,
textarea,
select{

    width:100%;
    padding:14px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;

}

textarea{

    resize:none;
    height:120px;

}

button{

    width:100%;
    padding:15px;
    background:#ff6b00;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;

}

button:hover{

    background:#e65c00;

}

</style>

</head>

<body>

<header>

<h1>🛒 Painel Administrativo - Produtos</h1>

</header>

<div class="container">

<div class="card">

<h2>➕ Novo Produto</h2>

<input
type="text"
id="nome"
placeholder="Nome do produto">

<textarea
id="descricao"
placeholder="Descrição"></textarea>

<input
type="number"
id="preco"
placeholder="Preço">

<input
type="text"
id="categoria"
placeholder="Categoria">

<input
type="text"
id="imagem"
placeholder="URL da imagem">

<button onclick="salvarProduto()">

Salvar Produto

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function salvarProduto(){

    const nome=document.getElementById("nome").value;

    const descricao=document.getElementById("descricao").value;

    const preco=document.getElementById("preco").value;

    const categoria=document.getElementById("categoria").value;

    const imagem=document.getElementById("imagem").value;

    if(nome=="" || descricao=="" || preco=="" || categoria=="" || imagem==""){

        alert("Preencha todos os campos.");

        return;

    }

    const { error } = await supabaseClient

    .from("produtos")

    .insert([

        {

            nome:nome,

            descricao:descricao,

            preco:preco,

            categoria:categoria,

            imagem:imagem

        }

    ]);

    if(error){

        alert(error.message);

        return;

    }

    alert("Produto cadastrado com sucesso!");

    document.getElementById("nome").value="";
    document.getElementById("descricao").value="";
    document.getElementById("preco").value="";
    document.getElementById("categoria").value="";
    document.getElementById("imagem").value="";

}

</script>

</body>

</html>
