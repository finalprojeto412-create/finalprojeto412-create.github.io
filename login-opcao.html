<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entrar - TechStore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

}

.caixa{

    width:450px;
    background:white;
    border-radius:15px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);

}

img{

    width:180px;
    margin-bottom:20px;

}

h1{

    color:#ff6b00;
    margin-bottom:15px;

}

p{

    color:#666;
    margin-bottom:35px;

}

a{

    display:block;
    width:100%;
    padding:16px;
    margin-bottom:18px;
    background:#ff6b00;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;

}

a:hover{

    background:#e65c00;

}

.voltar{

    background:#444;

}

.voltar:hover{

    background:#222;

}

</style>

</head>

<body>

<div class="caixa">

<img src="logo.png" alt="TechStore">

<h1>Bem-vindo</h1>

<p>Escolha como deseja acessar a TechStore.</p>

<a href="login.html">
👤 Entrar como Cliente
</a>

<a href="admin-login.html">
🛠 Entrar como Administrador
</a>

<a href="index.html" class="voltar">
⬅ Voltar ao Site
</a>

</div>

</body>
</html>
