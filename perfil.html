<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Conta - TechStore</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f5f5f5;
}

header{

background:#ff6b00;
padding:18px 40px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

}

header h2{

font-size:30px;

}

header a{

color:white;
text-decoration:none;
font-weight:bold;

}

.container{

width:1200px;
max-width:95%;
margin:40px auto;

display:grid;

grid-template-columns:300px 1fr;

gap:30px;

}

.sidebar{

background:white;

border-radius:15px;

padding:30px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.foto{

width:120px;
height:120px;

border-radius:50%;

background:#ff6b00;

color:white;

font-size:50px;

display:flex;
justify-content:center;
align-items:center;

margin:auto;

}

.nome{

margin-top:20px;

text-align:center;

font-size:22px;

font-weight:bold;

}

.email{

text-align:center;

color:#777;

margin-top:8px;

}

.menu{

margin-top:40px;

display:flex;

flex-direction:column;

gap:15px;

}

.menu a{

text-decoration:none;

background:#fafafa;

padding:15px;

border-radius:10px;

color:#333;

font-weight:bold;

transition:.3s;

}

.menu a:hover{

background:#ff6b00;
color:white;

}

.conteudo{

background:white;

border-radius:15px;

padding:35px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.titulo{

font-size:30px;

margin-bottom:30px;

}

.card{

background:#fafafa;

padding:20px;

border-radius:10px;

margin-bottom:20px;

}

.card h3{

color:#ff6b00;

margin-bottom:10px;

}

.card p{

font-size:18px;

}

button{

background:#ff6b00;

color:white;

border:none;

padding:15px 30px;

border-radius:10px;

cursor:pointer;

font-size:17px;

margin-top:30px;

}

button:hover{

background:#e65c00;

}

</style>

</head>

<body>

<header>

<h2>TechStore</h2>

<a href="index.html">🏠 Voltar à Loja</a>

</header>

<div class="container">

<div class="sidebar">

<div class="foto">

👤

</div>

<div class="nome" id="nomeUsuario">

Usuário

</div>

<div class="email" id="emailUsuario">

email@email.com

</div>

<div class="menu">

<a href="#">📦 Meus Pedidos</a>

<a href="#">❤️ Favoritos</a>

<a href="#">📍 Endereços</a>

<a href="#">💳 Pagamentos</a>

<a href="#">⚙️ Configurações</a>

</div>

<button id="sair">

Sair da Conta

</button>

</div>

<div class="conteudo">

<h1 class="titulo">

Minha Conta

</h1>

<div class="card">

<h3>Nome</h3>

<p id="nome"></p>

</div>

<div class="card">

<h3>E-mail</h3>

<p id="email"></p>

</div>

<div class="card">

<h3>Telefone</h3>

<p id="telefone"></p>

</div>

<div class="card">

<h3>Status</h3>

<p style="color:green;font-weight:bold;">

✔ Cliente TechStore

</p>

</div>

</div>

</div>

<script>

if(localStorage.getItem("usuarioLogado")!="true"){

window.location.href="login-opcao.html";

}

document.getElementById("nomeUsuario").innerHTML=localStorage.getItem("nome");

document.getElementById("emailUsuario").innerHTML=localStorage.getItem("email");

document.getElementById("nome").innerHTML=localStorage.getItem("nome");

document.getElementById("email").innerHTML=localStorage.getItem("email");

document.getElementById("telefone").innerHTML=localStorage.getItem("telefone");

document.getElementById("sair").onclick=function(){

localStorage.removeItem("usuarioLogado");

window.location.href="index.html";

}

</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</body>
</html>
