<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TechStore</title>
    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f5f5f5;

}

header{

    background:#ff6b00;

    color:white;

    padding:25px;

    text-align:center;

    box-shadow:0 3px 10px rgba(0,0,0,.2);

}

.container{

    width:90%;

    max-width:700px;

    margin:40px auto;

}

.card{

    background:white;

    border-radius:15px;

    padding:30px;

    margin-bottom:25px;

    box-shadow:0 5px 20px rgba(0,0,0,.12);

}

.card h2{

    color:#ff6b00;

    margin-bottom:20px;

}

.card p{

    margin:12px 0;

    font-size:18px;

}

button{

    width:100%;

    padding:16px;

    background:#ff6b00;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#e65c00;

}

label{

    display:block;

    margin:15px 0;

    font-size:18px;

}

</style>
</head>
<body>

    <header>

<h1>🛒 TechStore</h1>

</header>

<div class="container">

<div class="card">

<h2>📦 Resumo do Pedido</h2>

<p><strong>Produto:</strong> Notebook Dell Inspiron</p>

<p><strong>Quantidade:</strong> 1</p>

<p><strong>Total:</strong> R$ 3.799,00</p>

</div>

<div class="card">

<h2>💳 Forma de Pagamento</h2>

<label>

<input type="radio" name="pagamento">

 PIX

</label>

<label>

<input type="radio" name="pagamento">

 Boleto Bancário

</label>

<label>

<input type="radio" name="pagamento">

 Cartão de Crédito

</label>

</div>

<div class="card">

    <button>
        Finalizar Compra
    </button>

</div>

</body>
</html>
