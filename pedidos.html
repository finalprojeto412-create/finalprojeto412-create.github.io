<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meus Pedidos - TechStore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#0d6efd;
    color:#fff;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.titulo{
    font-size:32px;
    margin-bottom:30px;
}

.pedido{

    background:#fff;

    border-radius:12px;

    padding:25px;

    margin-bottom:25px;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.status{

    float:right;

    padding:8px 15px;

    border-radius:20px;

    color:white;

    font-size:14px;

    font-weight:bold;

}

.aguardando{

    background:#ffc107;

    color:#000;

}

.pago{

    background:#198754;

}

h3{

    margin-bottom:15px;

}

.info{

    color:#666;

    margin:8px 0;

}

.botoes{

    margin-top:25px;

}

button{

    background:#0d6efd;

    color:white;

    border:none;

    padding:12px 25px;

    border-radius:8px;

    cursor:pointer;

    margin-right:15px;

    font-size:15px;

}

button:hover{

    background:#084298;

}

</style>

</head>

<body>

<header>

<h1>🛒 TechStore</h1>

</header>

<div class="container">

<div class="pedido">

Aguardando Pagamento
</span>

<p class="info"><strong>Pedido:</strong> #1001</p>

<p class="info"><strong>Quantidade:</strong> 1</p>

<p class="info"><strong>Valor:</strong> R$ 3.799,00</p>

<p class="info"><strong>Data:</strong> 08/07/2026</p>

<div class="botoes">

<button>Ver Pedido</button>

<a href="checkout.html">

</div>

</div>
