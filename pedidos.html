<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meus Pedidos - TechStore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

header{
    background:#ff6b00;
    color:#fff;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.titulo{
    font-size:32px;
    margin-bottom:30px;
}

.pedido{

    background:white;

    border-radius:12px;

    padding:25px;

    margin-bottom:25px;

    box-shadow:0 5px 15px rgba(0,0,0,.15);


}

.status{

    float:right;

    padding:8px 15px;

    border-radius:20px;

    color:white;

    font-size:14px;

    font-weight:bold;

}

.aguardando{

    background:#ffc107;

    color:#000;

}

.pago{

    background:#198754;

}

h3{

    margin-bottom:15px;

}

.info{

    color:#555;

    margin:8px 0;

    font-size:18px;


}

.botoes{

    margin-top:25px;

}

button{

    background:#ff6b00;

    color:white;

    border:none;

    padding:15px 30px;

    border-radius:10px;

    cursor:pointer;

    margin-right:15px;

    font-size:17px;

    transition:.3s;

}

button:hover{

    background:#e65c00;

}
    .btnExcluir{

    background:#dc3545;
    width:60px;

}

.btnExcluir:hover{

    background:#bb2d3b;

}
    h3{

    font-size:32px;

    margin-bottom:20px;

}

</style>

</head>

<body>

<header>

<h1>🛒 TechStore</h1>

</header>

<div class="container">

<h2 class="titulo">📦 Meus Pedidos</h2>

<div id="listaPedidos"></div>

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

    <script>

async function carregarPedidos(){

    const { data, error } = await supabaseClient
    .from("pedidos")
    .select("*")
    .order("id", { ascending:false });

    if(error){

        console.log(error);
        return;

    }

    const lista = document.getElementById("listaPedidos");

    lista.innerHTML = "";

    data.forEach((pedido)=>{

        lista.innerHTML += `

        <div class="pedido">

            <span class="status aguardando">
            Aguardando Pagamento
            </span>

            <h3>${pedido.produto}</h3>

            <p class="info">
            <strong>Quantidade:</strong> ${pedido.quantidade}
            </p>

            <p class="info">
            <strong>Mensagem:</strong> ${pedido.mensagem}
            </p>

            <div class="botoes">

    <button onclick="verPedido('${pedido.id}')">
         Ver Pedido
    </button>

    <a href="checkout.html">
        <button>
            💳 Pagar Agora
        </button>
    </a>

    <button
        class="btnExcluir"
        onclick="cancelarPedido('${pedido.id}')">

        🗑

    </button>

</div>

        </div>

        `;

    });

}

async function cancelarPedido(id){

    const confirmar = confirm("Deseja realmente cancelar este pedido?");

    if(!confirmar) return;

    const { error } = await supabaseClient
        .from("pedidos")
        .delete()
        .eq("id", id);

    if(error){

        alert(error.message);
        return;

    }

    alert("Pedido cancelado!");

    carregarPedidos();

}

async function verPedido(id){

    const { data, error } = await supabaseClient
        .from("pedidos")
        .select("*")
        .eq("id", id)
        .single();

    if(error){

        alert(error.message);
        return;

    }

    alert(
`Produto: ${data.produto}

Quantidade: ${data.quantidade}

Mensagem:
${data.mensagem}`
    );

}

carregarPedidos();

</script>
</body>

</html>
