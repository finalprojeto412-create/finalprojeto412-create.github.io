<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meus Pedidos - TechStore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

header{
    background:#ff6b00;
    color:#fff;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.titulo{
    font-size:32px;
    margin-bottom:30px;
}

.pedido{

    background:white;

    border-radius:12px;

    padding:25px;

    margin-bottom:25px;

    box-shadow:0 5px 15px rgba(0,0,0,.15);


}

.status{

    float:right;

    padding:8px 15px;

    border-radius:20px;

    color:white;

    font-size:14px;

    font-weight:bold;

}

.aguardando{

    background:#ffc107;

    color:#000;

}

.pago{

    background:#198754;

}

h3{

    margin-bottom:15px;

}

.info{

    color:#555;

    margin:8px 0;

    font-size:18px;


}

.botoes{

    margin-top:25px;

}

button{

    background:#ff6b00;

    color:white;

    border:none;

    padding:15px 30px;

    border-radius:10px;

    cursor:pointer;

    margin-right:15px;

    font-size:17px;

    transition:.3s;

}

button:hover{

    background:#e65c00;

}
    h3{

    font-size:32px;

    margin-bottom:20px;

}

</style>

</head>

<body>

<header>

<h1>🛒 TechStore</h1>

</header>

<div class="container">

<h2 class="titulo">📦 Meus Pedidos</h2>

<div class="pedido">

<span class="status aguardando">
Aguardando Pagamento
</span>

<h3>Notebook Dell Inspiron</h3>

<p class="info"><strong>Pedido:</strong> #1001</p>

<p class="info"><strong>Quantidade:</strong> 1</p>

<p class="info"><strong>Valor:</strong> R$ 3.799,00</p>

<p class="info"><strong>Data:</strong> 08/07/2026</p>

<div class="botoes">

<button>Ver Pedido</button>

<a href="checkout.html">
    <button>Pagar Agora</button>
</a>

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

</body>

</html>
