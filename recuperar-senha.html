<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar Senha - TechStore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f5f5f5;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

}

.recuperar{

    width:420px;

    background:white;

    padding:40px;

    border-radius:15px;

    box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.logo{

    text-align:center;

    margin-bottom:30px;

}

.logo img{

    width:180px;

}

.logo h2{

    color:#ff6b00;

    margin-top:15px;

}

.logo p{

    color:#666;

    margin-top:10px;

    line-height:1.5;

}

label{

    display:block;

    margin-bottom:8px;

    margin-top:25px;

    font-weight:bold;

}

input{

    width:100%;

    padding:14px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:16px;

}

button{

    width:100%;

    margin-top:30px;

    padding:15px;

    background:#ff6b00;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#e65c00;

}

.voltar{

    text-align:center;

    margin-top:25px;

}

.voltar a{

    color:#ff6b00;

    text-decoration:none;

    font-weight:bold;

}

.voltar a:hover{

    text-decoration:underline;

}

</style>

</head>

<body>

<div class="recuperar">

<div class="logo">

<img src="logo.png" alt="TechStore">

<h2>Recuperar Senha</h2>

<p>

Digite seu e-mail cadastrado.<br>

Enviaremos um link para redefinir sua senha.

</p>

</div>

<form id="recuperarForm">

<label>E-mail</label>

<input
type="email"
id="email"
placeholder="Digite seu e-mail"
required>

<button type="submit">

Enviar Link

</button>

</form>

<div class="voltar">

<p>

Lembrou sua senha?

</p>

<br>

<a href="login.html">

Voltar ao Login

</a>

</div>

</div>

<script>

const recuperar = document.getElementById("recuperarForm");

recuperar.addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;

    alert("Um link de recuperação foi enviado para:\n\n" + email);

    window.location.href = "login.html";

});

</script>

</body>

</html>
