<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

display:flex;

background:#f5f5f5;

}

/* MENU */

.sidebar{

width:260px;

height:100vh;

background:#ff6b00;

color:white;

padding:30px;

position:fixed;

}

.sidebar h2{

margin-bottom:40px;

text-align:center;

}

.sidebar a{

display:block;

color:white;

text-decoration:none;

padding:15px;

margin-bottom:10px;

border-radius:8px;

transition:.3s;

font-size:17px;

}

.sidebar a:hover{

background:white;

color:#ff6b00;

}

/* CONTEÚDO */

.main{

margin-left:260px;

width:100%;

padding:40px;

}

.topo{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:40px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}

.card{

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.15);

text-align:center;

}

.card h2{

color:#ff6b00;

margin-bottom:15px;

}

.card p{

font-size:28px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>🛒 TechStore</h2>

<a href="#">📊 Dashboard</a>

<a href="#">📦 Produtos</a>

<a href="#">📋 Pedidos</a>

<a href="#">👥 Clientes</a>

<a href="#">💳 Pagamentos</a>

<a href="#">⚙ Configurações</a>

<a href="login.html">🚪 Sair</a>

</div>

<div class="main">

<div class="topo">

<h1>Bem-vindo, Administrador</h1>

<h3>08/07/2026</h3>

</div>

<div class="cards">

<div class="card">

<h2>📦 Produtos</h2>

<p>6</p>

</div>

<div class="card">

<h2>🛒 Pedidos</h2>

<p>12</p>

</div>

<div class="card">

<h2>👥 Clientes</h2>

<p>4</p>

</div>

<div class="card">

<h2>💰 Vendas</h2>

<p>R$ 9.300</p>

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</body>
</html>
