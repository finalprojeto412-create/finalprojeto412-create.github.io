<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - TechStore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f5f5f5;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.login{

    width:400px;

    background:white;

    border-radius:15px;

    padding:40px;

    box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.logo{

    text-align:center;

    margin-bottom:30px;

}

.logo img{

    width:180px;

}

.logo h2{

    color:#ff6b00;

    margin-top:10px;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

    color:#444;

}

input[type=email],
input[type=password]{

    width:100%;

    padding:14px;

    border:1px solid #ddd;

    border-radius:10px;

    margin-bottom:20px;

    font-size:16px;

}

.opcoes{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

    font-size:14px;

}

.opcoes a{

    color:#ff6b00;

    text-decoration:none;

}

.opcoes a:hover{

    text-decoration:underline;

}

button{

    width:100%;

    padding:15px;

    background:#ff6b00;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#e65c00;

}

.criar{

    margin-top:30px;

    text-align:center;

}

.criar a{

    color:#ff6b00;

    text-decoration:none;

    font-weight:bold;

}

.criar a:hover{

    text-decoration:underline;

}

</style>

</head>

<body>

<div class="login">

<div class="logo">

<img src="logo.png" alt="TechStore">

<h2>Painel Administrativo</h2>

</div>

<form id="loginForm">

<label>E-mail</label>

<input
type="email"
placeholder="Digite seu e-mail"
required>

<label>Senha</label>

<input
type="password"
placeholder="Digite sua senha"
required>

<div class="opcoes">

<label>
<input type="checkbox">
Lembrar-me
</label>

<a href="recuperar-senha.html">
Esqueci minha senha
</a>

</div>

<button type="submit" id="btnEntrar">
Entrar
</button>

</form>

<div class="criar">

<p>

Não possui uma conta?

</p>

<br>

<a href="cadastro.html">

Criar Conta

</a>

</div>

</div>
<script>

const login = document.getElementById("loginForm");

login.addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.querySelector("input[type=email]").value;
    const senha = document.querySelector("input[type=password]").value;

    if(email === "" || senha === ""){

        alert("Preencha todos os campos!");

        return;

    }

    alert("Login realizado com sucesso!");

    window.location.href = "admin.html";

});

</script>

</body>
</html>
